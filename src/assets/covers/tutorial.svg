<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#2563eb" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="640" height="320" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g stroke="#93c5fd" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80" x2="640" y2="80"/><line x1="0" y1="160" x2="640" y2="160"/><line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="160" y1="0" x2="160" y2="320"/><line x1="320" y1="0" x2="320" y2="320"/><line x1="480" y1="0" x2="480" y2="320"/>
  </g>
  <!-- Code brackets -->
  <text x="120" y="170" font-family="monospace" font-size="72" font-weight="700" fill="#2563eb" opacity="0.15">&lt;/&gt;</text>
  <!-- Floating circles -->
  <circle cx="480" cy="80" r="40" fill="#93c5fd" opacity="0.3"/>
  <circle cx="520" cy="200" r="24" fill="#60a5fa" opacity="0.2"/>
  <circle cx="100" cy="250" r="16" fill="#2563eb" opacity="0.15"/>
  <!-- Document icon -->
  <g filter="url(#shadow)" transform="translate(240, 60)">
    <rect x="0" y="0" width="160" height="200" rx="12" fill="white"/>
    <rect x="20" y="30" width="120" height="8" rx="4" fill="#bfdbfe"/>
    <rect x="20" y="50" width="90" height="8" rx="4" fill="#dbeafe"/>
    <rect x="20" y="70" width="130" height="8" rx="4" fill="#dbeafe"/>
    <rect x="20" y="100" width="120" height="8" rx="4" fill="#bfdbfe"/>
    <rect x="20" y="120" width="100" height="8" rx="4" fill="#dbeafe"/>
    <rect x="20" y="150" width="60" height="20" rx="10" fill="#2563eb" opacity="0.8"/>
    <circle cx="130" cy="20" r="6" fill="#93c5fd"/>
  </g>
  <!-- Bottom strip -->
  <rect x="0" y="264" width="640" height="56" fill="rgba(255,255,255,0.72)"/>
  <line x1="0" y1="264" x2="640" y2="264" stroke="#93c5fd" stroke-width="1"/>
</svg>
