<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0891b2" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="640" height="320" fill="url(#bg)"/>
  <!-- Minimalist geometric shapes -->
  <g opacity="0.15">
    <circle cx="200" cy="120" r="60" fill="#0891b2"/>
    <rect x="380" y="80" width="80" height="80" rx="8" fill="#0891b2" transform="rotate(15 420 120)"/>
    <polygon points="320,180 370,260 270,260" fill="#0891b2"/>
  </g>
  <!-- Typography elements -->
  <text x="180" y="160" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#0891b2" opacity="0.8">Aa</text>
  <text x="380" y="160" font-family="Inter, sans-serif" font-size="48" font-weight="300" fill="#0891b2" opacity="0.5">Aa</text>
  <!-- Spacing lines -->
  <line x1="180" y1="190" x2="460" y2="190" stroke="#0891b2" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="200" x2="420" y2="200" stroke="#0891b2" stroke-width="1" opacity="0.3"/>
  <!-- Color palette dots -->
  <g transform="translate(280, 240)">
    <circle cx="0" cy="0" r="8" fill="#0891b2" opacity="0.6"/>
    <circle cx="20" cy="0" r="8" fill="#67e8f9" opacity="0.6"/>
    <circle cx="40" cy="0" r="8" fill="#cffafe" opacity="0.6"/>
  </g>
  <!-- Bottom strip -->
  <rect x="0" y="264" width="640" height="56" fill="rgba(255,255,255,0.72)"/>
  <line x1="0" y1="264" x2="640" y2="264" stroke="#67e8f9" stroke-width="1"/>
</svg>
